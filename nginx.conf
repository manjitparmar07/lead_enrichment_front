server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Proxy all /api/* requests to the backend service
    location /api/ {
        # ── CORS — handle entirely at nginx so CDN/reverse-proxy can't strip it ──
        # Strip any CORS headers the backend may have added (avoids duplicates)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Max-Age;

        # Add CORS headers on ALL responses (always = includes 4xx/5xx)
        add_header 'Access-Control-Allow-Origin'      '$http_origin'                                         always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                                 always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS'               always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

        # Handle OPTIONS preflight here — no need to hit the backend
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' '86400';
            add_header 'Content-Length' '0';
            return 204;
        }

        proxy_pass             http://backend:8020;
        proxy_http_version     1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin            $http_origin;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 300s;
        proxy_send_timeout                 300s;
        proxy_connect_timeout              10s;
    }

    # Cache hashed static assets indefinitely
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for every unknown path
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}